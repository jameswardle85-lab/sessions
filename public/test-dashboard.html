<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>API Test Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --pass: #00e676;
      --fail: #ff1744;
      --text: #e8e8f0;
      --muted: #555570;
      --accent: #7c6af7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      padding: 48px 24px;
    }

    /* animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 48px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      margin-bottom: 16px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
    }

    /* summary bar */
    .summary {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .summary-card {
      flex: 1;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
    }

    .summary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .summary-card.total::before { background: var(--accent); }
    .summary-card.passed::before { background: var(--pass); }
    .summary-card.failed::before { background: var(--fail); }

    .summary-card .num {
      font-family: 'Syne', sans-serif;
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .summary-card.passed .num { color: var(--pass); }
    .summary-card.failed .num { color: var(--fail); }
    .summary-card.total .num { color: var(--accent); }

    .summary-card .card-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* progress bar */
    .progress-wrap {
      margin-bottom: 40px;
    }

    .progress-bar {
      height: 6px;
      background: var(--surface);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--pass));
      border-radius: 99px;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* test list */
    .section-title {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .test-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .test-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      animation: slideIn 0.4s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .test-item.pass { border-left: 3px solid var(--pass); }
    .test-item.fail { border-left: 3px solid var(--fail); }

    .tick {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .tick.pass { background: rgba(0,230,118,0.12); color: var(--pass); }
    .tick.fail { background: rgba(255,23,68,0.12); color: var(--fail); }

    .test-name {
      font-size: 13px;
      color: var(--text);
      flex: 1;
    }

    .test-duration {
      font-size: 11px;
      color: var(--muted);
    }

    /* loading / error states */
    .state {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .state .icon { font-size: 40px; margin-bottom: 16px; }

    .run-time {
      margin-top: 40px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="label">CI / CD Pipeline</div>
    <h1>API Test Results</h1>
    <div class="meta" id="meta">Loading latest results...</div>
  </header>

  <div id="app">
    <div class="state"><div class="icon">⏳</div>Fetching test results...</div>
  </div>
</div>

<script>
  const OWNER = 'jameswardle85-lab';
  const REPO  = 'sessions';
  const FILE  = 'test-results.json';

  async function load() {
    try {
      const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE}?t=${Date.now()}`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`Could not fetch results: ${res.status}`);
      const json = await res.json();
      render(json);
    } catch (err) {
      document.getElementById('app').innerHTML = `
        <div class="state">
          <div class="icon">⚠️</div>
          Could not load test results.<br/><br/>
          <small>${err.message}</small>
        </div>`;
    }
  }

  function render(json) {
    const suite   = json.testResults?.[0];
    const tests   = suite?.assertionResults || [];
    const total   = tests.length;
    const passed  = tests.filter(t => t.status === 'passed').length;
    const failed  = total - passed;
    const pct     = total ? Math.round((passed / total) * 100) : 0;
    const runDate = json.startTime ? new Date(json.startTime).toLocaleString() : 'unknown';

    document.getElementById('meta').textContent = `Last run: ${runDate}`;

    const items = tests.map((t, i) => {
      const ok   = t.status === 'passed';
      const name = t.fullName || `Test ${i+1}`;
      const dur  = t.duration != null ? `${t.duration}ms` : '';
      return `
        <div class="test-item ${ok ? 'pass' : 'fail'}" style="animation-delay:${i * 40}ms">
          <div class="tick ${ok ? 'pass' : 'fail'}">${ok ? '✓' : '✕'}</div>
          <div class="test-name">${name}</div>
          <div class="test-duration">${dur}</div>
        </div>`;
    }).join('');

    document.getElementById('app').innerHTML = `
      <div class="summary">
        <div class="summary-card total">
          <div class="num">${total}</div>
          <div class="card-label">Total</div>
        </div>
        <div class="summary-card passed">
          <div class="num">${passed}</div>
          <div class="card-label">Passed</div>
        </div>
        <div class="summary-card failed">
          <div class="num">${failed}</div>
          <div class="card-label">Failed</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="progress-label">
          <span>Pass rate</span>
          <span>${pct}%</span>
        </div>
      </div>

      <div class="section-title">Test breakdown</div>
      <div class="test-list">${items}</div>
      <div class="run-time">Results auto-update on every push to main</div>
    `;
  }

  load();
</script>
</body>
</html>
