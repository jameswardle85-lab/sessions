name: API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install Jest
        working-directory: backend
        run: npm install --save-dev jest

      - name: Copy test file
        run: cp api.test.js backend/api.test.js

      - name: Run API tests
        working-directory: backend
        run: npx jest api.test.js --verbose