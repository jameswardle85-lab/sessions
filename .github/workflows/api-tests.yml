name: API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install Jest
        working-directory: backend
        run: npm install --save-dev jest

      - name: Copy test file
        run: cp api.test.js backend/api.test.js

      - name: Run API tests and save results
        working-directory: backend
        run: npx jest api.test.js --verbose --json --outputFile=test-results.json || true

      - name: Commit test results to repo
        run: |
          cp backend/test-results.json test-results.json
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git stash
          git pull --rebase
          git stash pop
          git add test-results.json
          git diff --staged --quiet || git commit -m "Update test results [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}